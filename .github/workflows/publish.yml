name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Exact release tag to publish in vX.Y.Z format (for example v3.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Read package metadata
        id: package
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const { name, version } = require('./package.json');
          console.log(`name=${name}`);
          console.log(`version=${version}`);
          NODE

      - name: Validate exact release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if ! printf '%s' "${RELEASE_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag ${RELEASE_TAG} is not an exact vX.Y.Z release tag (for example v3.1.0)" >&2
            exit 1
          fi

          if [ "${RELEASE_TAG#v}" != "${{ steps.package.outputs.version }}" ]; then
            echo "Tag ${RELEASE_TAG} does not match package version ${{ steps.package.outputs.version }}" >&2
            exit 1
          fi

      - name: Check npm for existing package version
        id: npm
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "alreadyPublished=true" >> "$GITHUB_OUTPUT"
            echo "Package version already exists on npm; skipping publish."
          else
            echo "alreadyPublished=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.npm.outputs.alreadyPublished != 'true'
        run: npm publish --provenance --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists; skipping."
          else
            gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --generate-notes
          fi
